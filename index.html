<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .logo-video {
    width: 400px;
    height: 400px;

    /* STATIC MASK */
    -webkit-mask-image: url('hero.png');
    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;

    mask-image: url('hero.png');
    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;

    overflow: hidden;
    background: transparent;
}

.logo-video video {
    width: 160%;              /* 🔥 zoom in */
    height: 160%;
    object-fit: cover;

    position: absolute;
    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%); /* center video */

    opacity: 1;            /* very subtle */
    filter: brightness(0.7) contrast(0.6); /* soften */
}
    </style>
</head>
<body>
    <div class="logo-video">
    <video autoplay muted loop playsinline>
        <source src="video-bg.mp4" type="video/mp4">
    </video>
</div>
</body>
</html>
